<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Hierarchical Graph DB">
  <defs>
    <linearGradient id="bg-custom-graph-database" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg-custom-graph-database)"/>
  <rect width="800" height="500" fill="rgba(15,23,42,0.18)"/>
  <g transform="translate(400 210)" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <line x1="-120" y1="-50" x2="-30" y2="-80" opacity="0.7"/>
    <line x1="-30" y1="-80" x2="60" y2="-30" opacity="0.7"/>
    <line x1="60" y1="-30" x2="120" y2="40" opacity="0.7"/>
    <line x1="120" y1="40" x2="10" y2="70" opacity="0.7"/>
    <line x1="10" y1="70" x2="-90" y2="50" opacity="0.7"/>
    <line x1="-90" y1="50" x2="-120" y2="-50" opacity="0.7"/>
    <line x1="-30" y1="-80" x2="10" y2="70" opacity="0.7"/>
    <line x1="-120" y1="-50" x2="60" y2="-30" opacity="0.7"/>
    <circle cx="-120" cy="-50" r="14" fill="rgba(255,255,255,0.95)" stroke="none"/>
    <circle cx="-30" cy="-80" r="14" fill="rgba(255,255,255,0.95)" stroke="none"/>
    <circle cx="60" cy="-30" r="14" fill="rgba(255,255,255,0.95)" stroke="none"/>
    <circle cx="120" cy="40" r="14" fill="rgba(255,255,255,0.95)" stroke="none"/>
    <circle cx="10" cy="70" r="14" fill="rgba(255,255,255,0.95)" stroke="none"/>
    <circle cx="-90" cy="50" r="14" fill="rgba(255,255,255,0.95)" stroke="none"/>
  </g>
  <text x="400" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700" fill="#ffffff" letter-spacing="0.5">Hierarchical Graph DB</text>
</svg>
