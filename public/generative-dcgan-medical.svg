<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="DCGAN Medical">
  <defs>
    <linearGradient id="bg-generative-dcgan-medical" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg-generative-dcgan-medical)"/>
  <rect width="800" height="500" fill="rgba(15,23,42,0.18)"/>
  <g transform="translate(400 210)" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <rect x="-150" y="-50" width="100" height="100" rx="12" fill="rgba(255,255,255,0.2)"/>
    <text x="-100" y="6" text-anchor="middle" fill="#ffffff" stroke="none" font-family="Inter" font-size="20" font-weight="700">G</text>
    <rect x="50" y="-50" width="100" height="100" rx="12" fill="rgba(255,255,255,0.2)"/>
    <text x="100" y="6" text-anchor="middle" fill="#ffffff" stroke="none" font-family="Inter" font-size="20" font-weight="700">D</text>
    <path d="M -50 0 H 50" marker-end="url(#ah4)"/>
    <defs><marker id="ah4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ffffff"/></marker></defs>
  </g>
  <text x="400" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700" fill="#ffffff" letter-spacing="0.5">DCGAN Medical</text>
